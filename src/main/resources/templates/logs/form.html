<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Новая запись</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="p-4">
<div class="container">

    <h2>Создать / Редактировать запись</h2>

    <form th:action="@{/logs}" th:object="${catLog}" method="post">

        <!-- ЧЕКБОКС ДРУГОЕ ВРЕМЯ -->
        <!--
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="customTimeCheck">
            <label class="form-check-label" for="customTimeCheck">Другое время</label>
        </div>
        -->

        <!-- ДАТА/ВРЕМЯ -->
        <div class="mb-3">
            <label>Дата и время</label>
            <input type="datetime-local" th:field="*{recordedAt}" class="form-control" id="recordedAtField"/>
            <input type="hidden" name="recordedAt" id="recordedAtHidden">
        </div>

        <!-- УКАЗЫВАТЬ САХАР? -->
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" id="sugarCheck">
            <label class="form-check-label" for="sugarCheck">Сахар измерен</label>
        </div>

        <!-- САХАР -->
        <div class="mb-3">
            <label>Уровень сахара</label>
            <input type="number" step="0.1" th:field="*{glucoseLevel}" class="form-control" id="sugarField"/>
        </div>

        <!-- ИНСУЛИН ВВЕДЁН? -->
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" th:field="*{insulinInjected}" id="insulinCheck">
            <label class="form-check-label" for="insulinCheck">Инсулин введён</label>
        </div>

        <!-- ДОЗА -->
        <div class="mb-3">
            <label>Доза (мл)</label>
            <input type="number" step="0.005" th:field="*{insulinDoseMl}" class="form-control" id="doseField"/>
            <input type="hidden" name="insulinDoseMl" id="doseHidden" value="0">
        </div>

        <!-- ПОКОРМЛЕН -->
        <div class="form-check mb-2">
            <input class="form-check-input" type="checkbox" th:field="*{fed}" id="fed">
            <label class="form-check-label" for="fed">Покормлен</label>
        </div>

        <!-- ТИП КОРМА -->
        <div class="mb-3">
            <label>Тип корма</label>
            <select th:field="*{foodType}" class="form-select" id="foodType">
                <option th:each="ft : ${foodTypes}" th:value="${ft}" th:text="${ft}"></option>
            </select>
            <input type="hidden" name="foodType" id="foodTypeHidden" value="">
        </div>

        <!-- ПОРЦИЯ -->
        <div class="mb-3">
            <label>Порция (г)</label>
            <input type="number" th:field="*{portionGr}" class="form-control" id="portion"/>
            <input type="hidden" name="portionGr" id="portionHidden" value="0">
        </div>

        <!-- КОММЕНТАРИЙ -->
        <div class="mb-3">
            <label>Комментарий</label>
            <textarea th:field="*{comment}" class="form-control" rows="3" placeholder="Любые заметки..."></textarea>
        </div>

        <button class="btn btn-primary" type="submit">Сохранить</button>
        <a href="/" class="btn btn-link">Отмена</a>

    </form>
</div>

<script>

    // === ЛОГИКА "Время" === //

    const recordedAt = document.getElementById("recordedAtField");
    function setNow() {
        const now = new Date();
        const formatted = toLocalDateTimeValue(now);
        recordedAt.value = formatted;
    }

    // === ЛОГИКА ЧЕКБОКСА УРОВНЯ САХАРА === //

    const sugarCheck = document.getElementById("sugarCheck");
    const sugarLevelField = document.getElementById("sugarField");

    function updateSugarFieldAccessibility(){
        if(sugarCheck.checked) sugarLevelField.disabled = false;
        else {
            sugarLevelField.disabled = true;
            sugarLevelField.value = "";
        }
    }

    // === ЛОГИКА ИНСУЛИН/ДОЗА ===
    const insulinCheck = document.getElementById("insulinCheck");
    const doseField = document.getElementById("doseField");

    function updateDoseState() {
        if (insulinCheck.checked) {
            doseField.disabled = false;
        } else {
            doseField.disabled = true;
            doseField.value = "";
        }
    }

    insulinCheck.addEventListener("change", () => {
       if (insulinCheck.checked) {
           doseField.disabled = false;
          doseHidden.value = "";
       } else {
          doseField.disabled = true;
          doseField.value = "";
           doseHidden.value = "0";
       }
    });


    // === ЛОГИКА ПОКОРМЛЕН ЛИ? ===
    const fedCheck = document.getElementById("fed");
    const foodField = document.getElementById("foodType");
    const portionField = document.getElementById("portion");
    function updateFoodState() {
        if (fedCheck.checked) {
            foodField.disabled = false;
            portionField.disabled = false;
        } else {
            foodField.disabled = true;
            foodField.value = "";
            portionField.disabled = true;
            portionField.value = "";
        }
    }

    fedCheck.addEventListener("change", () => {
        if (fedCheck.checked) {
            foodType.disabled = false;
            portion.disabled = false;
            foodTypeHidden.value = "";
            portionHidden.value = "";
        } else {
            foodType.disabled = true;
            portion.disabled = true;
            foodTypeHidden.value = "";
            portionHidden.value = "0";
        }
    });

    // === ЛОГИКА ПРИВЕДЕНИЯ ВРЕМЕНИ К МОСКВЕ ===

    function toLocalDateTimeValue(date) {
    const pad = n => n.toString().padStart(2, '0');

    return date.getFullYear() + '-' +
        pad(date.getMonth() + 1) + '-' +
        pad(date.getDate()) + 'T' +
        pad(date.getHours()) + ':' +
        pad(date.getMinutes());
    }

    insulinCheck.addEventListener("change", updateDoseState);
    fedCheck.addEventListener("change", updateFoodState);
    window.addEventListener("change", updateSugarFieldAccessibility);
    window.addEventListener("load",setNow);
    window.addEventListener("load", updateDoseState);
    window.addEventListener("load", updateFoodState);
    window.addEventListener("load", updateSugarFieldAccessibility);

</script>

</body>
</html>
